name: Deploy to Private Server

on:
  push:
    branches:
      - main  # main 브랜치에 push될 때 실행

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Deploy to Windows Server
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.SERVER_HOST }}       # 192.168.219.153
          username: ${{ secrets.SERVER_USER }}   # 1004
          key: ${{ secrets.SERVER_SSH_KEY }}     # SSH private key
          script: |
            echo "Pull latest code"
            cd C:\Users\1004\Desktop\3float
            git reset --hard
            git clean -fd
            git pull origin main

            echo "Install Python dependencies"
            venv\Scripts\python.exe -m pip install --upgrade pip
            venv\Scripts\python.exe -m pip install -r requirements.txt

            echo "Restart Flask app"
            :: 현재 실행 중인 Flask 앱 종료
            taskkill /f /im python.exe || echo "No running python process"
            :: Flask 앱 재시작
            start "" venv\Scripts\python.exe run.py
